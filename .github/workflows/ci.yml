name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: false # 下の actions/cache で GOCACHE も含めて明示管理する

      # モジュールキャッシュ (GOMODCACHE) とビルドキャッシュ (GOCACHE) をまたいで持ち越す。
      # *.go を含めた key で保存し、restore-keys で前回分を温める。
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}-${{ hashFiles('**/*.go') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}-
            ${{ runner.os }}-go-

      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...
